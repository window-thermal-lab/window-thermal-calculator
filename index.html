<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Window Thermal Calculator</title>
</head>

<body>

  <h1>Window Thermal Calculator</h1>

  <label for="uwResult">Uw:</label>
  <input type="text" id="uwResult" readonly>

  <button id="calcBtn">計算</button>
  <br>
  <label>FW:</label>
  <input type="number" id="fWidth">
  <label>mm</label>
  <br>
  <label>FH:</label>
  <input type="number" id="fHeight">
  <label>mm</label>
  <br>
  <label>上枠:</label>
  <input type="number" id="hfWidth">
  <label>mm</label>
  <br>
  <label>縦枠:</label>
  <input type="number" id="jfWidth">
  <label>mm</label>
  <br>
  <label>下枠:</label>
  <input type="number" id="sfWidth">
  <label>mm</label>
  <br>
  <label>枠見込み:</label>
  <input type="number" id="fDepth">
  <label>mm</label>
  <br>
  <label>上框:</label>
  <input type="number" id="trfWidth">
  <label>mm</label>
  <br>
  <label>縦框:</label>
  <input type="number" id="stilefWidth">
  <label>mm</label>
  <br>
  <label>下框:</label>
  <input type="number" id="bfWidth">
  <label>mm</label>
  <br>
  <label>戸厚:</label>
  <input type="number" id="sDepth">
  <label>mm</label>
  <br>
  <label>上の重なり:</label>
  <input type="number" id="hol">
  <label>mm</label>
  <br>
  <label>縦の重なり:</label>
  <input type="number" id="jol">
  <label>mm</label>
  <br>
  <label>下の重なり:</label>
  <input type="number" id="sol">
  <label>mm</label>
   

  <div id="output"></div>

  <script src="src/calc.js"></script>

</body>
</html>
