<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Window Thermal Calculator</title>
</head>

<body>

  <h1>Window Thermal Calculator</h1>

  <label for="uwResult">Uw:</label>
  <input type="text" id="uwResult" readonly>

  <button id="calcBtn">計算</button>

  <label>Ug:</label>
  <input type="number" id="ugResult" step="0.1">
  <label>W/(m²·K)</label>
  <br>

  <select id="idGlassType">
  <option value="single_clear">単板クリア</option>
  <option value="double_clear">複層クリア</option>
  <option value="double_lowe_argon">複層Low-E Ar</option>
  </select>
  <br>
  <select id="idWindowType">
  <option value="doubleDoor">両開きドア</option>
  <option value="sliding">引違い</option>
  </select>
  <br>
  <label>FW:</label>
  <input type="number" id="fWidth">
  <label>mm</label>
  <br>
  <label>FH:</label>
  <input type="number" id="fHeight">
  <label>mm</label>
  <br>
  <label>上枠:</label>
  <input type="number" id="hfWidth">
  <label>mm</label>
  <br>
  <label>縦枠:</label>
  <input type="number" id="jfWidth">
  <label>mm</label>
  <br>
  <label>下枠:</label>
  <input type="number" id="sfWidth">
  <label>mm</label>
  <br>
  <label>枠見込み:</label>
  <input type="number" id="fDepth">
  <label>mm</label>
  <br>
  <label>上框:</label>
  <input type="number" id="trfWidth">
  <label>mm</label>
  <br>
  <label>縦框:</label>
  <input type="number" id="stilefWidth">
  <label>mm</label>
  <br>
  <label>下框:</label>
  <input type="number" id="bfWidth">
  <label>mm</label>
  <br>
  <label>戸厚:</label>
  <input type="number" id="sDepth">
  <label>mm</label>
  <br>
  <label>上枠と上框の重なり:</label>
  <input type="number" id="hol">
  <label>mm</label>
  <br>
  <label>縦枠と縦框の重なり:</label>
  <input type="number" id="jol">
  <label>mm</label>
  <br>
  <label>下枠と下框の重なり:</label>
  <input type="number" id="sol">
  <label>mm</label>
  <br>
  <select id="idWoodType">
  <option value="douglasFir">米松</option>
  <option value="pine">パイン</option>
  <option value="ash">タモ</option>
  <option value="whiteOak">ホワイトオーク</option>
  </select>
  <br>
  <select id="idSpacerType">
  <option value="aluSpacerPsi">アルミスペーサー</option>
  <option value="plasticSpacerPsi">樹脂スペーサー</option>
  </select>
   

  <pre id="output"></pre>

<script src="./src/calc.js" defer></script>

</body>
</html>
