<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Window Thermal Calculator</title>
</head>

<body>

  <h1>Window Thermal Calculator</h1>

  <label for="uwResult">Uw:</label>
  <input type="text" id="uwResult" readonly>

  <label>Ug:</label>
  <input type="number" id="ugInput" step="0.1">
  <label>W/(m²·K)</label>
  <br>

  <select id="idGlassType">
  <option value="single_clear">単板クリア</option>
  <option value="double_clear">複層クリア</option>
  <option value="double_lowe_argon">複層Low-E Ar</option>
  </select>
  <br>
  <select id="idWindowType">
  <option value="doubleDoor">両開きドア</option>
  <option value="sliding">引違い</option>
  </select>
  <select id="idAdvantageType">
  <option value="horizontal">横勝ち枠</option>
  <option value="vertical">縦勝ち枠</option>  
  </select>
  <br>
  <label>FW:</label>
  <input type="number" id="fw">
  <label>mm</label>
  <br>
  <label>FH:</label>
  <input type="number" id="fh">
  <label>mm</label>
  <br>
  <label>上枠:</label>
  <input type="number" id="headFaceW">
  <label>mm</label>
  <br>
  <label>縦枠:</label>
  <input type="number" id="jambFaceW">
  <label>mm</label>
  <br>
  <label>下枠:</label>
  <input type="number" id="sillFaceW">
  <label>mm</label>
  <br>
  <label>枠見込み:</label>
  <input type="number" id="frameD">
  <label>mm</label>
  <br>
  <label>上框:</label>
  <input type="number" id="topRailFaceW">
  <label>mm</label>
  <br>
  <label>縦框:</label>
  <input type="number" id="stileFaceW">
  <label>mm</label>
  <br>
  <label>下框:</label>
  <input type="number" id="bottomRailFaceW">
  <label>mm</label>
  <br>
  <label>戸厚:</label>
  <input type="number" id="sashD">
  <label>mm</label>
  <br>
  <label>上枠と上框の重なり:</label>
  <input type="number" id="hol">
  <label>mm</label>
  <br>
  <label>縦枠と縦框の重なり:</label>
  <input type="number" id="jol">
  <label>mm</label>
  <br>
  <label>下枠と下框の重なり:</label>
  <input type="number" id="sol">
  <label>mm</label>
  <br>
  <select id="idWoodType">
  <option value="douglasFir">米松</option>
  <option value="pine">パイン</option>
  <option value="ash">タモ</option>
  <option value="whiteOak">ホワイトオーク</option>
  </select>
 
  <select id="idSpacerType">
  <option value="aluSpacerPsi">アルミスペーサー</option>
  <option value="plasticSpacerPsi">樹脂スペーサー</option>
  </select>
   

  <div style="display:flex; gap:20px;">
  <pre id="output" style="width:300px; border:1px solid #ccc; padding:10px;"></pre>
  <pre id="output2" style="width:300px; border:1px solid #ccc; padding:10px;"></pre>
  </div>

<script src="./src/calc.js" defer></script>

</body>
</html>
